<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Countdown</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="countdown-card">
            <div class="event-image-container">
                <img id="eventImage" src="images/image.png" alt="Event Image" class="event-image">
            </div>
            
            <div class="content">
                <h1 id="eventName" class="event-title">Loading Event...</h1>
                
                <div class="countdown-display">
                    <div class="time-unit">
                        <div id="days" class="time-value">00</div>
                        <div class="time-label">Days</div>
                    </div>
                    
                    <div class="time-unit">
                        <div id="hours" class="time-value">00</div>
                        <div class="time-label">Hours</div>
                    </div>
                    
                    <div class="time-unit">
                        <div id="minutes" class="time-value">00</div>
                        <div class="time-label">Minutes</div>
                    </div>
                    
                    <div class="time-unit">
                        <div id="seconds" class="time-value">00</div>
                        <div class="time-label">Seconds</div>
                    </div>
                </div>
                
                <div id="eventDate" class="event-date"></div>
                
                <div id="eventStatus" class="event-status"></div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
